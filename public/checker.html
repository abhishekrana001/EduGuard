<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integrity Checker</title>
    <link rel="stylesheet" href="checker.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

    <h1>🔍 Integrity Checker</h1>

    <div class="card">

        <h2>Check Assignment</h2>

        <!-- TEXT -->
        <textarea id="textInput" placeholder="Paste your assignment here..."></textarea>

        <!-- IMAGE -->
        <input type="file" id="imageInput" accept="image/*">

        <!-- BUTTONS -->
        <div class="btn-group">
            <button onclick="checkText()">📝 Check Text</button>
            <button onclick="checkImage()">🖼️ Check Image</button>
        </div>

        <!-- RESULT -->
        <div id="resultBox" class="result-box">

            <div class="result-placeholder">
                <p>🔍 Your result will appear here</p>
                <span>Check text or upload image to analyze</span>
            </div>

        </div>

    </div>

</div>

<script src="checker.js"></script>
</body>
</html>
